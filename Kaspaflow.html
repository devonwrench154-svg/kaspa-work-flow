<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kaspaflow — Automation for Recruitment Firms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Inter+Tight:wght@400;500;600&display=swap">
<style>
  :root {
    --bg: #FAFAF7;
    --bg-2: #F2F1EC;
    --bg-3: #E8E6DF;
    --ink: #18181A;
    --ink-2: #3A3A3D;
    --ink-3: #6B6B6E;
    --ink-4: #A3A3A3;
    --hair: #D7D5CE;
    --hair-2: #E5E3DC;
    --accent: #003A70;
    --accent-bright: #0A66C2;
    --accent-soft: #E6EEF6;
    --serif: "Source Serif 4", "Iowan Old Style", Georgia, "Times New Roman", serif;
    --sans: "Inter Tight", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --maxw: 1280px;
    --gut: clamp(20px, 4vw, 56px);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; text-decoration: none; }
  img, svg { display: block; max-width: 100%; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gut); }
  .hairline { height: 1px; background: var(--hair); width: 100%; }
  .eyebrow {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 500;
  }
  .eyebrow .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 10px; vertical-align: 2px; }

  h1, h2, h3, h4 { font-family: var(--serif); font-weight: 400; letter-spacing: -0.012em; margin: 0; color: var(--ink); }
  h1 { font-size: clamp(48px, 7vw, 96px); line-height: 1.02; letter-spacing: -0.022em; font-weight: 300; }
  h1 em { font-style: italic; font-weight: 400; color: var(--accent); }
  h2 { font-size: clamp(32px, 4.4vw, 56px); line-height: 1.05; letter-spacing: -0.018em; }
  h2 em { font-style: italic; color: var(--accent); }
  h3 { font-size: clamp(22px, 2.2vw, 28px); line-height: 1.15; }
  p { margin: 0; }
  .lede { font-family: var(--serif); font-size: clamp(18px, 1.6vw, 22px); line-height: 1.5; color: var(--ink-2); font-weight: 400; }

  /* nav */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--bg) 86%, transparent);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--hair-2);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 18px clamp(16px, 2.5vw, 40px); gap: 24px; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--serif); font-size: 22px; letter-spacing: -0.01em; }
  .brand-mark { width: 26px; height: 26px; }
  .brand b { font-weight: 500; }
  .brand i { font-style: italic; color: var(--accent); font-weight: 400; }
  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a { font-size: 14px; color: var(--ink-2); cursor: pointer; transition: color .2s ease; }
  .nav-links a:hover { color: var(--accent); }
  .nav-cta { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border: 1px solid var(--accent); border-radius: 999px; font-size: 13.5px; cursor: pointer; transition: background .2s ease, border-color .2s ease, transform .1s ease; background: var(--accent); color: #fff; white-space: nowrap; line-height: 1; position: relative; overflow: hidden; }
  .nav-cta:hover { background: var(--accent-bright); border-color: var(--accent-bright); }
  .nav-cta .arrow { transition: transform .25s ease; }
  .nav-cta:hover .arrow { transform: translateX(3px); }

  /* hero */
  .hero { padding: clamp(48px, 9vh, 96px) 0 clamp(40px, 8vh, 80px); position: relative; }
  .hero-grid { display: grid; grid-template-columns: 1.05fr 1fr; gap: clamp(32px, 5vw, 80px); align-items: end; }
  .hero-meta { display: flex; gap: 32px; margin-bottom: 28px; }
  .hero-meta span { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .hero h1 .line { display: block; }
  .hero-sub { margin-top: clamp(24px, 3vw, 36px); max-width: 540px; }
  .hero-actions { margin-top: 36px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 22px; border-radius: 999px; font-size: 14px; cursor: pointer; transition: background .25s ease, border-color .25s ease, color .25s ease, box-shadow .25s ease, transform .1s ease; border: 1px solid transparent; font-family: var(--sans); position: relative; overflow: hidden; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-bright); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--hair); }
  .btn-ghost:hover { border-color: var(--ink); }
  .btn .arrow { transition: transform .25s ease; }
  .btn:hover .arrow { transform: translateX(3px); }

  .hero-aside { font-size: 13.5px; color: var(--ink-3); line-height: 1.6; max-width: 320px; border-left: 1px solid var(--hair); padding-left: 20px; align-self: start; margin-top: 12px; }
  .hero-aside b { color: var(--ink); font-weight: 500; }

  /* hero diagram */
  .hero-diagram-wrap {
    margin-top: clamp(48px, 7vh, 96px);
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.02));
    border-top: 1px solid var(--hair);
    padding-top: 40px;
  }
  .hero-diagram {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 40px;
    align-items: start;
  }
  .hero-diagram-meta { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); white-space: nowrap; padding-top: 24px; }

  /* trust strip */
  .trust { padding: 28px 0; border-top: 1px solid var(--hair-2); border-bottom: 1px solid var(--hair-2); background: var(--accent-soft); }
  .trust-inner { display: grid; grid-template-columns: 220px 1fr; gap: 40px; align-items: center; }
  .trust-label { font-size: 11.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .trust-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .trust-stat { display: flex; flex-direction: column; gap: 4px; border-left: 1px solid var(--hair); padding-left: 18px; }
  .trust-stat .num { font-family: var(--serif); font-size: clamp(24px, 2.6vw, 32px); font-weight: 400; letter-spacing: -0.01em; line-height: 1; }
  .trust-stat .num em { color: var(--accent); font-style: italic; font-weight: 400; font-family: var(--serif); }
  .trust-stat .num { font-family: var(--serif); font-size: 18px; font-style: italic; }
  .trust-stat .lbl { font-size: 12px; color: var(--ink-3); }

  /* section */
  .section { padding: clamp(72px, 10vh, 128px) 0; }
  .section + .section { border-top: 1px solid var(--hair-2); }
  .section-head { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(32px, 5vw, 72px); align-items: end; margin-bottom: clamp(40px, 6vh, 72px); }
  .section-head .left { display: flex; flex-direction: column; gap: 24px; }
  .section-head .right { color: var(--ink-2); font-size: 16.5px; line-height: 1.65; max-width: 520px; }
  .section-num { font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--ink-3); }

  /* services */
  .services-list { display: flex; flex-direction: column; overflow: visible; padding-top: 8px; }
  .service-row {
    display: grid;
    grid-template-columns: 80px 1.2fr 1.4fr 0.7fr;
    gap: clamp(24px, 4vw, 48px);
    padding: 36px 0;
    border-top: 1px solid var(--hair);
    align-items: start;
    cursor: pointer;
    transition: background .25s ease, box-shadow .25s ease, transform .25s ease;
    position: relative;
  }
  .service-row:last-child { border-bottom: 1px solid var(--hair); }
  .service-row:hover { transform: translateY(-5px); background: #fff; box-shadow: 0 20px 48px -10px rgba(0,40,100,0.16), 16px 0 0 #fff, -16px 0 0 #fff; z-index: 2; }
  .service-row .num { font-family: var(--serif); font-style: italic; color: var(--ink-3); font-size: 18px; padding-top: 4px; }
  .service-row h3 { font-size: clamp(22px, 2.2vw, 28px); }
  .service-row .desc { color: var(--ink-2); font-size: 15px; line-height: 1.6; }
  .service-row .meta { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; text-align: right; }
  .service-row .meta .tag { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .service-row .meta .save { font-family: var(--serif); font-style: italic; color: var(--accent); font-size: 16px; }
  .service-row .arrow-cta { font-size: 13px; color: var(--ink-3); display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .service-row:hover .arrow-cta { color: var(--accent); }

  /* phase label between module groups */
  .phase-label {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 16px 0 8px;
    border-top: 1px solid var(--ink); /* heavier rule for phase divider */
    margin-top: 12px;
  }
  .phase-label .phase-meta { font-size: 12px; color: var(--ink-3); font-family: var(--serif); font-style: italic; }

  /* methodology */
  .methodology {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--hair);
  }
  .method-step {
    padding: 32px 24px 36px;
    border-right: 1px solid var(--hair);
    display: flex; flex-direction: column; gap: 16px;
    position: relative;
    transition: background .25s ease;
  }
  .method-step:last-child { border-right: none; }
  .method-step:hover { background: var(--bg-2); }
  .method-num { font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--ink-3); }
  .method-week { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }
  .method-title h3 { font-size: 22px; line-height: 1.15; }
  .method-desc { font-size: 14px; line-height: 1.6; color: var(--ink-2); flex: 1; }
  .method-deliv { display: flex; flex-direction: column; gap: 6px; padding-top: 16px; border-top: 1px solid var(--hair-2); font-size: 12.5px; color: var(--ink-3); font-family: var(--serif); font-style: italic; }

  /* faq */
  .faq { margin-top: 80px; display: grid; grid-template-columns: 0.8fr 2fr; gap: clamp(32px, 5vw, 72px); align-items: start; }
  .faq-head { position: sticky; top: 100px; }
  .faq-list { display: flex; flex-direction: column; border-top: 1px solid var(--ink); }
  .faq-cat-section { display: block; }
  .faq-cat-label { padding: 18px 0 6px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-4); font-family: var(--sans); font-weight: 500; }
  .faq-item { border-bottom: 1px solid var(--hair); }
  .faq-trigger {
    cursor: pointer; background: none; border: none; width: 100%; text-align: left;
    font: inherit; margin: 0; color: inherit;
    display: grid; grid-template-columns: 56px 1fr 32px; gap: 16px;
    padding: 22px 0; align-items: baseline;
    transition: color .2s ease;
  }
  .faq-trigger:hover { color: var(--accent); }
  .faq-trigger:focus-visible { outline: 2px solid var(--accent-bright); outline-offset: 3px; border-radius: 2px; }
  .faq-num { font-family: var(--serif); font-style: italic; color: var(--accent); font-size: 14px; }
  .faq-q { font-family: var(--serif); font-size: 19px; line-height: 1.3; color: var(--ink); font-weight: 400; }
  .faq-toggle { font-family: var(--serif); font-size: 22px; color: var(--ink-3); text-align: right; transition: transform .3s ease, color .3s ease; line-height: 1; }
  .faq-item.open .faq-toggle { transform: rotate(45deg); color: var(--accent); }
  .faq-panel { overflow: hidden; max-height: 0; transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
  .faq-panel.open { max-height: 560px; }
  .faq-a {
    padding: 0 0 28px 72px;
    font-size: 15px; line-height: 1.65; color: var(--ink-2);
    max-width: 720px;
  }
  .faq-cat-nav { display: none; }
  @media (min-width: 921px) {
    .faq-cat-nav { display: flex; flex-direction: column; gap: 2px; margin-top: 28px; }
    .faq-cat-nav a { display: block; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-4); padding: 5px 0 5px 12px; border-left: 2px solid transparent; transition: color .2s, border-color .2s; font-weight: 500; }
    .faq-cat-nav a:hover { color: var(--ink-2); border-left-color: var(--hair); }
    .faq-cat-label { display: none; }
  }
  @media (max-width: 920px) {
    .faq { grid-template-columns: 1fr; }
    .faq-head { position: static; }
    .faq-a { padding-left: 56px; }
  }

  /* principles */
  .principles { margin-top: 80px; display: grid; grid-template-columns: 0.8fr 2fr; gap: clamp(32px, 5vw, 72px); align-items: start; }
  .principles-head { position: sticky; top: 100px; }
  .principles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: 1px solid var(--hair); }
  .principle {
    display: grid; grid-template-columns: 56px 1fr; gap: 16px;
    padding: 28px 0;
    border-bottom: 1px solid var(--hair);
  }
  .principle:nth-child(odd) { border-right: 1px solid var(--hair); padding-right: 28px; }
  .principle:nth-child(even) { padding-left: 28px; }
  .principle-num { font-family: var(--serif); font-style: italic; color: var(--accent); font-size: 22px; line-height: 1; }
  .principle-body h4 { font-family: var(--serif); font-size: 19px; font-weight: 400; margin: 0 0 6px; line-height: 1.2; }
  .principle-body p { font-size: 14px; line-height: 1.6; color: var(--ink-2); margin: 0; }

  @media (max-width: 920px) {
    .methodology { grid-template-columns: 1fr; }
    .method-step { border-right: none; border-bottom: 1px solid var(--hair); }
    .principles { grid-template-columns: 1fr; }
    .principles-head { position: static; }
    .principles-grid { grid-template-columns: 1fr; }
    .principle:nth-child(odd) { border-right: none; padding-right: 0; }
    .principle:nth-child(even) { padding-left: 0; }
  }

  /* integration points list */
  .integration-points { display: flex; flex-direction: column; margin-top: 32px; }
  .integration-points > div {
    display: grid; grid-template-columns: 48px 1fr; gap: 16px; align-items: baseline;
    padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.12);
    font-size: 14.5px; color: rgba(250,250,247,0.85);
  }
  .integration-points > div:last-child { border-bottom: 1px solid rgba(255,255,255,0.12); }
  .integration-points .num { font-family: var(--serif); font-style: italic; color: rgba(168,184,207,0.9); font-size: 14px; }

  /* integration band */
  .integration {
    padding: clamp(56px, 8vh, 96px) 0;
    background: var(--ink);
    color: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .integration .eyebrow { color: rgba(250,250,247,0.6); }
  .integration h2 { color: var(--bg); }
  .integration h2 em { color: #A8B8CF; }
  .integration .lede { color: rgba(250,250,247,0.75); }
  .integration-grid { display: grid; grid-template-columns: 1.1fr 1.4fr; gap: clamp(40px, 6vw, 96px); align-items: center; margin-top: 48px; }

  /* case studies */
  .cases { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(24px, 3vw, 40px); }
  .case {
    background: #fff;
    border: 1px solid var(--hair);
    border-radius: 4px;
    padding: clamp(28px, 3vw, 40px);
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: transform .35s ease, box-shadow .35s ease;
    cursor: pointer;
  }
  .case:hover { transform: translateY(-3px); box-shadow: 0 18px 40px -28px rgba(31,58,95,0.35); }
  .case-head { display: flex; justify-content: space-between; align-items: center; }
  .case-firm { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .case-sector { font-family: var(--serif); font-style: italic; color: var(--ink-3); font-size: 14px; }
  .case h3 { font-size: clamp(22px, 2vw, 26px); line-height: 1.2; }
  .case-quote { font-family: var(--serif); font-size: 16px; color: var(--ink-2); line-height: 1.55; border-left: 2px solid var(--accent); padding-left: 16px; font-style: italic; }
  .case-author { font-size: 12.5px; color: var(--ink-3); display: flex; gap: 8px; align-items: center; }
  .case-author .who { color: var(--ink-2); font-weight: 500; }
  .case-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding-top: 16px; border-top: 1px solid var(--hair); }
  .case-stat .num { font-family: var(--serif); font-size: 28px; font-weight: 400; letter-spacing: -0.01em; }
  .case-stat .num em { color: var(--accent); font-style: italic; }
  .case-stat .lbl { font-size: 11.5px; color: var(--ink-3); letter-spacing: 0.06em; }

  /* pricing */
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: 1px solid var(--hair); background: var(--hair-2); border-radius: 4px; overflow: hidden; }
  .plan { background: #fff; padding: clamp(20px, 2vw, 28px); display: flex; flex-direction: column; gap: 14px; position: relative; transition: background .25s ease; }
  .plan + .plan { border-left: 1px solid var(--hair); }
  .plan.featured { background: var(--accent); color: var(--bg); }
  .plan.featured .plan-name { color: #fff; }
  .plan.featured .plan-name em { color: #fff; }
  .plan.featured .plan-strap, .plan.featured .plan-desc, .plan.featured .plan-annot { color: rgba(255,255,255,0.78); }
  .plan.featured .plan-price { border-color: rgba(255,255,255,0.18); }
  .plan.featured .plan-feat-list li { border-color: rgba(255,255,255,0.14); color: rgba(255,255,255,0.92); }
  .plan.featured .feat-num { color: #C8D4E6; }
  .plan.featured .btn-primary { background: #fff; color: var(--accent); }
  .plan.featured .btn-primary:hover { background: var(--bg); }
  .plan-name { font-family: var(--serif); font-size: 22px; line-height: 1.1; }
  .plan-name em { font-style: italic; color: var(--accent); font-weight: 400; }
  .plan-strap { font-family: var(--serif); font-style: italic; color: var(--ink-3); font-size: 13px; margin-top: 2px; line-height: 1.35; }
  .plan-desc { font-size: 13px; color: var(--ink-3); line-height: 1.5; }
  .plan-price { display: flex; align-items: baseline; gap: 6px; padding: 10px 0 8px; border-top: 1px solid var(--hair); }
  .plan-price .amount { font-family: var(--serif); font-size: 36px; font-weight: 300; letter-spacing: -0.02em; line-height: 1; }
  .plan-price .per { font-size: 12px; color: var(--ink-3); }
  .plan.featured .plan-price .per { color: rgba(255,255,255,0.65); }
  .plan-annot { font-size: 11.5px; color: var(--ink-3); font-family: var(--serif); font-style: italic; margin-top: -4px; }
  .plan-feat-list { list-style: none; padding: 0; margin: 4px 0 0; display: flex; flex-direction: column; flex: 1; }
  .plan-feat-list li { font-size: 13px; color: var(--ink-2); padding: 9px 0; border-top: 1px solid var(--hair-2); display: grid; grid-template-columns: 22px 1fr; gap: 6px; align-items: baseline; line-height: 1.4; }
  .plan-feat-list li::before { content: none; }
  .feat-num { font-family: var(--serif); font-style: italic; color: var(--accent); font-size: 11px; }
  .plan .btn { width: 100%; justify-content: center; padding: 11px 18px; font-size: 13px; }
  .plan-badge { position: absolute; top: 18px; right: 18px; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; padding: 4px 9px; border-radius: 999px; background: rgba(255,255,255,0.14); color: #fff; border: 1px solid rgba(255,255,255,0.25); }
  .plan.featured .plan-desc { color: rgba(250,250,247,0.7); }
  .plan.featured .plan-feat-list li { border-color: rgba(255,255,255,0.12); color: rgba(250,250,247,0.85); }
  .plan.featured .plan-feat-list li::before { color: #A8B8CF; }
  .plan.featured .btn-primary { background: var(--bg); color: var(--ink); }
  .plan.featured .btn-primary:hover { background: var(--accent-soft); }
  .plan-name { font-family: var(--serif); font-size: 24px; }
  .plan-name em { font-style: italic; color: var(--accent); font-weight: 400; }
  .plan-desc { font-size: 14px; color: var(--ink-3); line-height: 1.55; }
  .plan-price { display: flex; align-items: baseline; gap: 8px; padding: 16px 0; border-top: 1px solid var(--hair); border-bottom: 1px solid var(--hair); }
  .plan.featured .plan-price { border-color: rgba(255,255,255,0.12); }
  .plan-price .amount { font-family: var(--serif); font-size: 44px; font-weight: 300; letter-spacing: -0.02em; line-height: 1; }
  .plan-price .per { font-size: 13px; color: var(--ink-3); }
  .plan.featured .plan-price .per { color: rgba(250,250,247,0.6); }
  .plan-feat-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; }
  .plan-strap { font-family: var(--serif); font-style: italic; color: var(--ink-3); font-size: 14px; margin-top: 4px; }
  .plan.featured .plan-strap { color: rgba(168,184,207,0.9); }
  .plan-annot { font-size: 12px; color: var(--ink-3); letter-spacing: 0.04em; margin-top: -8px; font-family: var(--serif); font-style: italic; }
  .plan.featured .plan-annot { color: rgba(250,250,247,0.6); }
  .plan-feat-list li { font-size: 14px; color: var(--ink-2); padding: 12px 0; border-top: 1px solid var(--hair-2); display: grid; grid-template-columns: 28px 1fr; gap: 8px; align-items: baseline; }
  .plan.featured .plan-feat-list li { border-color: rgba(255,255,255,0.10); color: rgba(250,250,247,0.88); }
  .plan-feat-list li::before { content: none; }
  .feat-num { font-family: var(--serif); font-style: italic; color: var(--accent); font-size: 12.5px; }
  .plan.featured .feat-num { color: #C8D4E6; }

  /* contact */
  .contact-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: clamp(48px, 6vw, 96px); align-items: start; }
  .contact-form { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--hair); }
  .field { display: grid; grid-template-columns: 180px 1fr; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--hair); align-items: center; }
  .field label { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .field input, .field select, .field textarea {
    background: transparent; border: none; outline: none;
    font-family: var(--sans); font-size: 16px; color: var(--ink);
    padding: 4px 0; width: 100%; resize: none;
  }
  .field input::placeholder, .field textarea::placeholder { color: var(--ink-4); }
  .field textarea { min-height: 60px; line-height: 1.5; padding-top: 4px; }
  .field-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { padding: 6px 12px; border-radius: 999px; border: 1px solid var(--hair); font-size: 12.5px; cursor: pointer; transition: all .2s; color: var(--ink-2); user-select: none; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .form-submit { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 16px; flex-wrap: wrap; }
  .form-note { font-size: 12.5px; color: var(--ink-3); max-width: 320px; }
  .booking { background: #fff; border: 1px solid var(--hair); padding: clamp(28px, 3vw, 36px); border-radius: 4px; }
  .booking h4 { font-family: var(--serif); font-size: 22px; margin-bottom: 8px; font-weight: 400; }
  .booking-desc { font-size: 14px; color: var(--ink-3); line-height: 1.55; }
  .booking-times { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
  .slot { padding: 12px; border: 1px solid var(--hair); border-radius: 4px; font-size: 13.5px; cursor: pointer; transition: all .2s; text-align: center; font-family: var(--sans); }
  .slot .day { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); display: block; margin-bottom: 2px; }
  .slot:hover { border-color: var(--ink); }
  .slot.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .slot.active .day { color: rgba(250,250,247,0.7); }
  .booking-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
  .booking-field { display: flex; flex-direction: column; gap: 5px; }
  .booking-field label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
  .booking-field input { background: var(--bg); border: 1px solid var(--hair); border-radius: 4px; padding: 9px 12px; font: inherit; font-size: 13.5px; color: var(--ink); outline: none; transition: border-color .2s; width: 100%; box-sizing: border-box; }
  .booking-field input:focus { border-color: var(--accent); }
  .booking-success { padding: 16px 0; }
  .booking-success-title { font-family: var(--serif); font-size: 20px; font-weight: 400; margin-bottom: 10px; }
  .booking-success p { font-size: 14px; color: var(--ink-3); line-height: 1.6; }
  .form-success { display: flex; flex-direction: column; justify-content: center; padding: 48px 36px; background: var(--bg-2); border-radius: 4px; min-height: 280px; }
  .form-success-title { font-family: var(--serif); font-size: clamp(24px, 3vw, 32px); font-weight: 400; margin-bottom: 12px; }
  .form-success p { font-size: 14.5px; color: var(--ink-3); line-height: 1.6; max-width: 380px; }
  .form-error { font-size: 13px; color: #b94040; margin-top: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  /* footer */
  .footer { padding: clamp(48px, 6vh, 80px) 0 32px; border-top: 1px solid var(--hair); margin-top: 0; }
  .footer-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 48px; }
  .footer h5 { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; margin-bottom: 16px; }
  .footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .footer a { font-size: 14px; color: var(--ink-2); cursor: pointer; }
  .footer a:hover { color: var(--accent); }
  .footer-tag { font-family: var(--serif); font-size: 18px; line-height: 1.5; color: var(--ink-2); margin-top: 12px; max-width: 320px; }
  .footer-bottom { display: flex; justify-content: space-between; padding-top: 32px; margin-top: 56px; border-top: 1px solid var(--hair); font-size: 12.5px; color: var(--ink-3); }

  /* diagram primitives */
  .node-card {
    background: #fff;
    border: 1px solid var(--hair);
    border-radius: 6px;
    padding: 14px 16px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
    transition: all .3s ease;
  }
  .node-card.dark { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .node-card.accent { border-color: var(--accent); }

  /* small */
  @media (max-width: 920px) {
    .nav-links { display: none; }
    .hero-grid { grid-template-columns: 1fr; }
    .section-head { grid-template-columns: 1fr; }
    .service-row { grid-template-columns: 40px 1fr; }
    .service-row .desc, .service-row .meta { grid-column: 2; }
    .integration-grid, .cases, .contact-grid { grid-template-columns: 1fr; }
    .pricing-grid { grid-template-columns: 1fr; }
    .plan + .plan { border-left: none; border-top: 1px solid var(--hair); }
    .footer-grid { grid-template-columns: 1fr 1fr; }
    .field { grid-template-columns: 1fr; gap: 4px; }
    .trust-inner { grid-template-columns: 1fr; gap: 16px; }
    .trust-stats { grid-template-columns: repeat(2, 1fr); }
  }

  /* dark mode */
  body.dark {
    --bg: #14141A;
    --bg-2: #1B1B22;
    --bg-3: #22222A;
    --ink: #F4F2EC;
    --ink-2: #C8C6C0;
    --ink-3: #8A8884;
    --ink-4: #5C5A56;
    --hair: #2A2A30;
    --hair-2: #20202A;
    --accent: #A8B8CF;
    --accent-soft: #1F2530;
  }
  body.dark .case, body.dark .booking, body.dark .plan, body.dark .node-card { background: var(--bg-2); }
  body.dark .booking-field input { background: var(--bg-3); border-color: var(--hair); }
  body.dark .form-success { background: var(--bg-3); }
  body.dark .plan.featured { background: var(--accent); color: var(--bg); }
  body.dark .plan.featured .plan-name em { color: var(--bg); }
  body.dark .integration { background: #0A0A0E; }

  /* density */
  body.tight .section { padding: clamp(48px, 7vh, 88px) 0; }
  body.tight .service-row { padding: 24px 0; }
  body.tight .hero { padding: clamp(32px, 6vh, 64px) 0 clamp(24px, 5vh, 48px); }

  /* utility */
  .reveal { opacity: 0; transform: translateY(12px); transition: opacity .6s ease, transform .6s ease; }
  .reveal.visible { opacity: 1; transform: none; }

  /* FAQ blue band */
  .faq-band { background: #003A70; padding: clamp(56px, 8vh, 96px) 0; }
  .faq-band .eyebrow { color: rgba(255,255,255,0.5); }
  .faq-band .eyebrow .dot { background: rgba(255,255,255,0.4); }
  .faq-band .lede { color: rgba(255,255,255,0.62); }
  .faq-band .faq { margin-top: 0; }
  .faq-band .faq-list { border-color: rgba(255,255,255,0.22); }
  .faq-band .faq-item { border-color: rgba(255,255,255,0.1); }
  .faq-band .faq-cat-label { color: rgba(255,255,255,0.22); }
  .faq-band .faq-trigger { color: rgba(255,255,255,0.9); }
  .faq-band .faq-trigger:hover { color: #A8B8CF; }
  .faq-band .faq-trigger:focus-visible { outline-color: rgba(168,184,207,0.8); }
  .faq-band .faq-q { color: rgba(255,255,255,0.9); }
  .faq-band .faq-num { color: rgba(168,184,207,0.75); }
  .faq-band .faq-toggle { color: rgba(255,255,255,0.3); }
  .faq-band .faq-item.open .faq-toggle { color: #A8B8CF; }
  .faq-band .faq-a { color: rgba(255,255,255,0.65); }
  .faq-band .faq-cat-nav a { color: rgba(255,255,255,0.3); }
  .faq-band .faq-cat-nav a:hover { color: rgba(255,255,255,0.65); border-left-color: rgba(255,255,255,0.18); }
  body.dark .faq-band { background: #0D2645; }

  /* button press + ripple */
  .btn:focus:not(:focus-visible), .nav-cta:focus:not(:focus-visible) { outline: none; }
  .btn:active, .nav-cta:active { transform: scale(0.96); transition: transform 0.08s ease; }
  .ripple {
    position: absolute; border-radius: 50%;
    transform: scale(0); pointer-events: none;
    animation: ripple-out 0.55s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes ripple-out { to { transform: scale(4); opacity: 0; } }

</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="diagrams.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script>
document.addEventListener('click', function(e) {
  var btn = e.target.closest('.btn, .nav-cta');
  if (!btn) return;
  var rect = btn.getBoundingClientRect();
  var size = Math.max(rect.width, rect.height);
  var r = document.createElement('span');
  r.className = 'ripple';
  var isPrimary = btn.classList.contains('btn-primary') || btn.classList.contains('nav-cta');
  r.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (e.clientX - rect.left - size / 2) + 'px;top:' + (e.clientY - rect.top - size / 2) + 'px;background:' + (isPrimary ? 'rgba(255,255,255,0.22)' : 'rgba(0,0,0,0.07)') + ';';
  btn.appendChild(r);
  r.addEventListener('animationend', function() { r.remove(); });
});
</script>
</body>
</html>
